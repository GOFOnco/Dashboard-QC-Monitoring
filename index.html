<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRFT & 5R SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { box-sizing: border-box; margin: 0; }
        * { font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        .toast {
            position: fixed; top: 20px; right: 20px; padding: 16px 24px;
            border-radius: 8px; z-index: 9999; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .trend-table th {
            background-color: #374151;
            color: #e5e7eb;
            font-size: 0.75rem;
            padding: 0.75rem 0.5rem;
            text-align: center;
            border-right: 1px solid #4b5563;
        }
        .trend-table td {
            padding: 0.6rem 0.5rem;
            text-align: center;
            border-right: 1px solid #4b5563;
            border-bottom: 1px solid #374151;
        }
        .trend-table tr:hover { background-color: #374151; }
        .item-badge {
            background-color: #1e3a5f;
            color: #93c5fd;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .product-badge { background-color: #3b2e5f; color: #c4b5fd; }
        .category-badge { background-color: #1e4a4a; color: #99f6e4; }
        .parameter-tag {
            display: inline-block;
            background-color: #1e3a5f;
            color: #93c5fd;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            margin: 0.1rem 0.2rem;
        }
        .photo-thumb {
            width: 50px; height: 50px; object-fit: cover;
            border-radius: 4px; cursor: pointer;
        }
        .photo-thumb:hover { opacity: 0.8; }
        .photo-zoom {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;
            z-index: 10000; cursor: pointer;
        }
        .photo-zoom img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .mgmt-tab-active { border-bottom: 2px solid #10b981; color: #10b981; }
        .area-badge {
            background-color: #1e3a5f;
            color: #93c5fd;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            margin: 0.1rem 0.2rem;
        }
        .subarea-badge {
            background-color: #3b2e5f;
            color: #c4b5fd;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.6rem;
            margin: 0.05rem 0.1rem;
        }
        .analyst-list-item {
            border-left: 3px solid #10b981;
            margin-bottom: 0.75rem;
        }
        .area-item {
            border-left: 3px solid #8b5cf6;
            margin-left: 1rem;
            margin-top: 0.25rem;
            margin-bottom: 0.25rem;
        }
        .subarea-item {
            border-left: 3px solid #f59e0b;
            margin-left: 2rem;
            margin-top: 0.15rem;
            margin-bottom: 0.15rem;
            font-size: 0.8rem;
        }
        .temuan-item {
            background-color: #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #8b5cf6;
        }
        .temuan-item .remove-temuan {
            cursor: pointer;
            color: #ef4444;
            font-size: 0.75rem;
            transition: color 0.2s;
        }
        .temuan-item .remove-temuan:hover { color: #f87171; }
        .project-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .project-selector { background: #0f172a; }
        .status-badge {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.6rem;
            font-weight: 600;
        }
        .status-open { background: #ef4444; color: white; }
        .status-closed { background: #22c55e; color: white; }
        .status-inprogress { background: #f59e0b; color: white; }
    </style>
</head>
<body class="h-full bg-gray-900 text-gray-100">
    <div id="app" class="h-full w-full flex flex-col overflow-auto">
        <!-- Header -->
        <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-4">
                <div id="project-icon" class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <div>
                    <h1 id="app-title" class="text-xl font-bold text-emerald-400">BRFT SYSTEM</h1>
                    <p id="company-name" class="text-xs text-gray-400">Created by MSTD</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div id="current-date" class="text-sm text-gray-400 font-medium"></div>
                    <div id="current-time" class="text-xs text-emerald-400 font-bold tracking-wider mt-1"></div>
                </div>
            </div>
        </header>

        <!-- Project Selector -->
        <div id="project-selector" class="project-selector p-8 flex items-center justify-center gap-8 flex-1">
            <div class="project-card bg-gray-800 rounded-2xl p-8 w-64 text-center border-2 border-emerald-500/30 hover:border-emerald-400" data-project="brft">
                <div class="w-24 h-24 bg-emerald-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-12 h-12 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <h2 class="text-2xl font-bold text-emerald-400">BRFT</h2>
                <p class="text-gray-400 text-sm mt-2">Quality Control Monitoring</p>
            </div>
            <div class="project-card bg-gray-800 rounded-2xl p-8 w-64 text-center border-2 border-purple-500/30 hover:border-purple-400" data-project="5r">
                <div class="w-24 h-24 bg-purple-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-12 h-12 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
                </div>
                <h2 class="text-2xl font-bold text-purple-400">5R</h2>
                <p class="text-gray-400 text-sm mt-2">5R Audit Monitoring</p>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <nav id="main-nav" class="bg-gray-800 border-b border-gray-700 px-6 flex-shrink-0 hidden">
            <div class="flex gap-1 overflow-x-auto" id="nav-tabs">
                <button class="tab-btn tab-active px-4 py-3 text-sm font-medium transition hover:text-emerald-400" data-tab="dashboard"> 📊 DASHBOARD </button>
                <button class="tab-btn px-4 py-3 text-sm font-medium text-gray-400 transition hover:text-emerald-400" data-tab="input"> ➕ INPUT </button>
                <button class="tab-btn px-4 py-3 text-sm font-medium text-gray-400 transition hover:text-emerald-400" data-tab="management"> ⚙️ MANAGEMENT </button>
                <button id="back-to-projects" class="px-4 py-3 text-sm font-medium text-gray-400 transition hover:text-blue-400 ml-auto"> 🏠 HOME </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 p-6 overflow-auto hidden">
            <!-- Dashboard Tab -->
            <div id="dashboard-tab" class="tab-content">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" id="summary-cards"></div>
                <div class="bg-gray-800 rounded-xl p-4 mb-6 card-shadow border border-gray-700" id="filter-section"></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6" id="chart-section"></div>
                <div class="bg-gray-800 rounded-xl p-5 card-shadow border border-gray-700" id="table-section"></div>
            </div>
            <div id="input-tab" class="tab-content hidden"></div>
            <div id="management-tab" class="tab-content hidden"></div>
        </main>
    </div>

    <!-- Photo Zoom -->
    <div id="photo-zoom" class="photo-zoom" onclick="closeZoom()">
        <img id="zoom-image" src="" alt="Zoom">
    </div>

    <!-- Update 5R Modal -->
    <div id="update-5r-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-xl p-6 max-w-lg w-full mx-4 border border-gray-700 max-h-[90vh] overflow-y-auto">
            <h3 class="text-lg font-bold text-purple-400 mb-4 flex items-center gap-2">✏️ UPDATE TEMUAN 5R</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">ACTION / TINDAKAN *</label>
                    <textarea id="update-action" rows="3" placeholder="JELASKAN TINDAKAN YANG DILAKUKAN..." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 focus:ring-2 focus:ring-purple-500 placeholder-gray-500 resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">FOTO AFTER (OPTIONAL)</label>
                    <input type="file" id="update-photo" accept="image/*" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 text-sm text-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-purple-600 file:text-white hover:file:bg-purple-700">
                    <div id="update-photo-preview" class="mt-2 hidden">
                        <img id="update-photo-img" class="h-20 w-20 object-cover rounded">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">CLOSED BY (INISIAL) *</label>
                    <input type="text" id="update-closedby" placeholder="MASUKKAN INISIAL" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 focus:ring-2 focus:ring-purple-500 placeholder-gray-500 uppercase">
                </div>
                <div class="flex gap-3 pt-2">
                    <button id="confirm-update-5r" class="flex-1 bg-purple-600 hover:bg-purple-700 py-3 rounded-lg font-medium transition flex items-center justify-center gap-2">💾 SIMPAN UPDATE</button>
                    <button id="cancel-update-5r" class="px-6 bg-gray-600 hover:bg-gray-500 py-3 rounded-lg font-medium transition">❌ BATAL</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-xl p-6 max-w-md w-full mx-4 border border-gray-700">
            <h3 class="text-lg font-bold text-white mb-2">⚠️ KONFIRMASI HAPUS</h3>
            <p id="delete-message" class="text-gray-400 mb-6">APAKAH ANDA YAKIN INGIN MENGHAPUS DATA INI?</p>
            <div class="flex gap-3"><button id="confirm-delete" class="flex-1 bg-red-600 hover:bg-red-700 py-2 rounded-lg font-medium transition">🗑️ HAPUS</button> <button id="cancel-delete" class="flex-1 bg-gray-600 hover:bg-gray-500 py-2 rounded-lg font-medium transition">❌ BATAL</button></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-xl p-6 max-w-md w-full mx-4 border border-gray-700">
            <h3 class="text-lg font-bold text-white mb-4">✏️ EDIT DATA</h3>
            <div class="mb-4"><label class="block text-xs text-gray-400 mb-1">NILAI BARU</label> <input type="text" id="edit-value" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 focus:ring-2 focus:ring-emerald-500"></div>
            <div class="flex gap-3"><button id="confirm-edit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-2 rounded-lg font-medium transition">💾 SIMPAN</button> <button id="cancel-edit" class="flex-1 bg-gray-600 hover:bg-gray-500 py-2 rounded-lg font-medium transition">❌ BATAL</button></div>
        </div>
    </div>

    <script>
        // ============================================================
        // STORAGE
        // ============================================================
        let memoryStore = {};

        function isLocalStorageAvailable() {
            try { const test = 'test_' + Date.now(); localStorage.setItem(test, test); localStorage.removeItem(test); return true; } catch { return false; }
        }

        const USE_LOCAL_STORAGE = isLocalStorageAvailable();

        const DB = {
            get(key, defaultVal = null) {
                if (USE_LOCAL_STORAGE) {
                    try { const data = localStorage.getItem('qc_' + key); return data ? JSON.parse(data) : defaultVal; } catch { return defaultVal; }
                }
                return memoryStore[key] !== undefined ? memoryStore[key] : defaultVal;
            },
            set(key, value) {
                if (USE_LOCAL_STORAGE) {
                    try { localStorage.setItem('qc_' + key, JSON.stringify(value)); } catch (e) { memoryStore[key] = value; }
                } else { memoryStore[key] = value; }
            },
            id() { return Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
        };

        // ============================================================
        // DATA STORE
        // ============================================================
        let store = {
            findings: [], findings5r: [], analysts: [], products: [], categories: [], targets: [], areas: [], auditLogs: []
        };

        function loadStore() {
            store.findings = DB.get('findings', []);
            store.findings5r = DB.get('findings5r', []);
            store.analysts = DB.get('analysts', []);
            store.products = DB.get('products', []);
            store.categories = DB.get('categories', []);
            store.targets = DB.get('targets', []);
            store.areas = DB.get('areas', []);
            store.auditLogs = DB.get('auditLogs', []);
        }

        function saveStore() {
            DB.set('findings', store.findings);
            DB.set('findings5r', store.findings5r);
            DB.set('analysts', store.analysts);
            DB.set('products', store.products);
            DB.set('categories', store.categories);
            DB.set('targets', store.targets);
            DB.set('areas', store.areas);
            DB.set('auditLogs', store.auditLogs);
        }

        // ============================================================
        // STATE
        // ============================================================
        let currentProject = null;
        let isAdminLoggedIn = false;
        let deleteCallback = null;
        let editCallback = null;
        let charts = {};
        let currentFilteredFindings = [];
        let temuan5rItems = [];
        let update5rId = null;

        // ============================================================
        // UTILITIES
        // ============================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'} text-white`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function addAuditLog(action, details) {
            store.auditLogs.unshift({ id: DB.id(), created_at: new Date().toISOString(), action, details });
            if (store.auditLogs.length > 1000) store.auditLogs = store.auditLogs.slice(0, 1000);
            saveStore();
        }

        function getAnalystName(id) {
            const a = store.analysts.find(x => x.id === id);
            return a ? a.name : id;
        }

        function getAreaName(id) {
            const a = store.areas.find(x => x.id === id);
            return a ? a.name : id;
        }

        function getSubAreas(areaId) {
            const a = store.areas.find(x => x.id === areaId);
            return a ? a.subareas || [] : [];
        }

        function openZoom(src) {
            document.getElementById('zoom-image').src = src;
            document.getElementById('photo-zoom').style.display = 'flex';
        }

        function closeZoom() {
            document.getElementById('photo-zoom').style.display = 'none';
        }

        // ============================================================
        // PROJECT SELECTOR
        // ============================================================
        document.querySelectorAll('.project-card').forEach(card => {
            card.addEventListener('click', function() {
                const project = this.dataset.project;
                currentProject = project;
                document.getElementById('project-selector').classList.add('hidden');
                document.getElementById('main-nav').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');

                const title = document.getElementById('app-title');
                const icon = document.getElementById('project-icon');
                if (project === 'brft') {
                    title.textContent = 'BRFT SYSTEM';
                    title.className = 'text-xl font-bold text-emerald-400';
                    icon.className = 'w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center';
                    icon.querySelector('svg').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />';
                } else {
                    title.textContent = '5R SYSTEM';
                    title.className = 'text-xl font-bold text-purple-400';
                    icon.className = 'w-10 h-10 bg-purple-600 rounded-lg flex items-center justify-center';
                    icon.querySelector('svg').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />';
                }

                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-emerald-400'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('text-gray-400'));
                document.querySelector('.tab-btn[data-tab="dashboard"]').classList.add('tab-active', 'text-emerald-400');
                document.querySelector('.tab-btn[data-tab="dashboard"]').classList.remove('text-gray-400');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById('dashboard-tab').classList.remove('hidden');

                if (project === 'brft') {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        const tab = b.dataset.tab;
                        if (tab === 'dashboard') b.textContent = ' 📊 DASHBOARD QC';
                        else if (tab === 'input') b.textContent = ' ➕ INPUT QC';
                        else if (tab === 'management') b.textContent = ' ⚙️ MANAGEMENT';
                    });
                    loadDashboardBrft();
                } else {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        const tab = b.dataset.tab;
                        if (tab === 'dashboard') b.textContent = ' 📊 DASHBOARD 5R';
                        else if (tab === 'input') b.textContent = ' 🧹 INPUT 5R';
                        else if (tab === 'management') b.textContent = ' ⚙️ MANAGEMENT';
                    });
                    loadDashboard5r();
                }
            });
        });

        document.getElementById('back-to-projects').addEventListener('click', function() {
            currentProject = null;
            document.getElementById('project-selector').classList.remove('hidden');
            document.getElementById('main-nav').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            Object.keys(charts).forEach(key => { if (charts[key]) { charts[key].destroy(); delete charts[key]; } });
        });

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (!currentProject) return;
                const tab = this.dataset.tab;
                const isBrft = currentProject === 'brft';
                const colorClass = isBrft ? 'text-emerald-400' : 'text-purple-400';

                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('tab-active', 'text-emerald-400', 'text-purple-400');
                    b.classList.add('text-gray-400');
                });
                this.classList.add('tab-active', colorClass);
                this.classList.remove('text-gray-400');

                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(`${tab}-tab`).classList.remove('hidden');

                if (tab === 'dashboard') {
                    if (currentProject === 'brft') loadDashboardBrft();
                    else loadDashboard5r();
                } else if (tab === 'input') {
                    if (currentProject === 'brft') loadInputFormBrft();
                    else loadInputForm5r();
                } else if (tab === 'management') {
                    loadManagement();
                }
            });
        });

        // ============================================================
        // DASHBOARD BRFT
        // ============================================================
        function loadDashboardBrft() {
            const summaryHTML = `
                <div class="bg-gray-800 rounded-xl p-5 card-shadow border border-gray-700">
                    <div class="flex items-center justify-between">
                        <div><p class="text-xs text-gray-400 mb-1">Σ TEMUAN QC</p><p id="total-findings" class="text-3xl font-bold text-white">${store.findings.length}</p></div>
                        <div class="w-12 h-12 bg-red-500/20 rounded-xl flex items-center justify-center"><svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg></div>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-xl p-5 card-shadow border border-gray-700">
                    <div class="flex items-center justify-between">
                        <div><p class="text-xs text-gray-400 mb-1">Σ BATCH TEMUAN</p><p id="unique-batches" class="text-3xl font-bold text-orange-400">${new Set(store.findings.map(f => f.batch_number).filter(Boolean)).size}</p></div>

        function updateDashboardBrft() {
            let filtered = [...store.findings];
            const dateFrom = document.getElementById('filter-date-from')?.value;
            const dateTo = document.getElementById('filter-date-to')?.value;
            if (dateFrom) filtered = filtered.filter(f => f.date >= dateFrom);
            if (dateTo) filtered = filtered.filter(f => f.date <= dateTo);

            const tbody = document.getElementById('findings-table');
            if (!tbody) return;
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="py-8 text-center text-gray-500">TIDAK ADA DATA</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).map((f, index) => {
                let formattedDate = f.date || '-';
                if (f.date) {
                    const [y, m, d] = f.date.split('-');
                    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
                    formattedDate = `${d} ${months[parseInt(m)-1]} ${y}`;
                }
                const photoHtml = f.photo ? `<img src="${f.photo}" class="photo-thumb" onclick="event.stopPropagation();openZoom('${f.photo}')">` : '-';
                return `<tr class="hover:bg-gray-700/50">
                    <td class="py-3 px-3 text-gray-300">${index+1}</td>
                    <td class="py-3 px-3 text-gray-300">${formattedDate}</td>
                    <td class="py-3 px-3 text-gray-300">${f.batch_number||'-'}</td>
                    <td class="py-3 px-3 text-gray-300">${f.analyst_name||'-'}</td>
                    <td class="py-3 px-3 text-gray-300">${f.parameter||'-'}</td>
                    <td class="py-3 px-3"><span class="px-2 py-1 bg-amber-500/20 text-amber-400 rounded text-xs">${f.category_name||'-'}</span></td>
                    <td class="py-3 px-3">${photoHtml}</td>
                    <td class="py-3 px-3 text-gray-300 max-w-xs whitespace-normal break-words">${f.description||'-'}</td>
                </tr>`;
            }).join('');
        }

        function resetFilterBrft() {
            const now = new Date();
            const year = now.getFullYear();

            document.getElementById('filter-date-from').value = `${year}-${month}-01`;
            const lastDay = new Date(year, now.getMonth() + 1, 0).getDate();

        function exportPdfBrft() {
            const data = store.findings;
            if (data.length === 0) { showToast('TIDAK ADA DATA', 'error'); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text('LAPORAN TEMUAN QC', 105, 15, { align: 'center' });
            doc.setFontSize(10);
            doc.text(`Total: ${data.length}`, 105, 25, { align: 'center' });
            let y = 40;
            doc.setFontSize(7);
            data.forEach((f, i) => {
                if (y > 280) { doc.addPage(); y = 20; }
                doc.text(`${i+1}. ${f.batch_number||'-'} | ${f.analyst_name||'-'}`, 15, y);
                const desc = f.description || '-';
                const lines = doc.splitTextToSize(desc, 180);
                lines.forEach((line, idx) => { if (y > 280) { doc.addPage(); y = 20; } doc.text(line, 20, y + 4 + idx * 4); });
                y += lines.length * 4 + 6;
            });
            doc.save(`QC_TEMUAN_${new Date().toISOString().split('T')[0]}.pdf`);
            showToast('PDF EXPORT', 'success');
        }

        function exportExcelBrft() {
            const data = store.findings;
            if (data.length === 0) { showToast('TIDAK ADA DATA', 'error'); return; }
            const excelData = data.map((f, i) => ({
                NO: i+1, TANGGAL: f.date||'-', BATCH: f.batch_number||'-',
                ANALYST: f.analyst_name||'-', PARAMETER: f.parameter||'-',
                KATEGORI: f.category_name||'-', TEMUAN: f.description||'-'
            }));
            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "QC");
            XLSX.writeFile(wb, `QC_TEMUAN_${new Date().toISOString().split('T')[0]}.xlsx`);
            showToast('EXCEL EXPORT', 'success');
        }

        function updateDashboard5r() {
            let filtered = [...store.findings5r];
            const dateFrom = document.getElementById('filter-5r-date-from')?.value;
            const dateTo = document.getElementById('filter-5r-date-to')?.value;
            const areaFilter = document.getElementById('filter-5r-area')?.value;
            const auditorFilter = document.getElementById('filter-5r-auditor')?.value;
            const statusFilter = document.getElementById('filter-5r-status')?.value;

            if (dateFrom) filtered = filtered.filter(f => f.date >= dateFrom);
            if (dateTo) filtered = filtered.filter(f => f.date <= dateTo);
            if (areaFilter) filtered = filtered.filter(f => f.area_name === areaFilter);
            if (auditorFilter) filtered = filtered.filter(f => f.auditor_name === auditorFilter);
            if (statusFilter) filtered = filtered.filter(f => f.status === statusFilter);

            document.getElementById('total-5r').textContent = filtered.length;
            document.getElementById('total-open-5r').textContent = filtered.filter(f => f.status !== 'closed').length;
            document.getElementById('total-closed-5r').textContent = filtered.filter(f => f.status === 'closed').length;
            document.getElementById('total-auditor-5r').textContent = new Set(filtered.map(f => f.auditor_name).filter(Boolean)).size;

            const tbody = document.getElementById('findings-5r-table');
            if (!tbody) return;
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="py-8 text-center text-gray-500">TIDAK ADA DATA</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).map((f, index) => {
                let formattedDate = f.date || '-';
                if (f.date) {
                    const [y, m, d] = f.date.split('-');
                    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
                    formattedDate = `${d} ${months[parseInt(m)-1]} ${y}`;
                }
                const photoHtml = f.photo ? `<img src="${f.photo}" class="photo-thumb" onclick="event.stopPropagation();openZoom('${f.photo}')">` : '-';
                const statusClass = f.status === 'closed' ? 'status-closed' : 'status-open';
                const statusText = f.status === 'closed' ? 'CLOSED' : 'OPEN';
                const closedInfo = f.closed_by ? `<div class="text-xs text-gray-400 mt-1">by: ${f.closed_by}</div>` : '';
                return `<tr class="hover:bg-gray-700/50">
                    <td class="py-3 px-3 text-gray-300">${index+1}</td>
                    <td class="py-3 px-3 text-gray-300">${formattedDate}</td>
                    <td class="py-3 px-3 text-gray-300">${f.auditor_name||'-'}</td>
                    <td class="py-3 px-3 text-gray-300">${f.auditee_name||'-'}</td>
                    <td class="py-3 px-3 text-gray-300">${f.area_name||'-'}</td>
                    <td class="py-3 px-3 text-gray-300">${f.subarea||'-'}</td>
                    <td class="py-3 px-3">${photoHtml}</td>
                    <td class="py-3 px-3 text-gray-300 max-w-xs whitespace-normal break-words">${f.temuan||'-'}</td>
                    <td class="py-3 px-3"><span class="status-badge ${statusClass}">${statusText}</span>${closedInfo}</td>
                    <td class="py-3 px-3">
                        ${f.status !== 'closed' ? `<button class="update-5r-btn text-blue-400 hover:text-blue-300 px-2 py-1 bg-blue-600/20 rounded text-xs" data-id="${f.id}">✏️ UPDATE</button>` : '<span class="text-gray-500 text-xs">-</span>'}
                    </td>
                </tr>`;
            }).join('');

            document.querySelectorAll('.update-5r-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    openUpdate5rModal(this.dataset.id);
                });
            });
        }

                showToast('ACTION DAN CLOSED BY WAJIB DIISI!', 'error');
                return;

            const finding = store.findings5r.find(f => f.id === update5rId);
            if (!finding) { showToast('DATA TIDAK DITEMUKAN', 'error'); return; }

            const photoInput = document.getElementById('update-photo');
            let photoAfter = null;
            if (photoInput.files && photoInput.files[0]) {
                photoAfter = await new Promise(r => { const reader = new FileReader(); reader.onload = e => r(e.target.result); reader.readAsDataURL(photoInput.files[0]); });
            }

            finding.status = 'closed';
            finding.closed_by = closedBy;
            finding.action_taken = action;
            finding.photo_after = photoAfter;
            finding.closed_at = new Date().toISOString();

            saveStore();

        function exportPdf5r() {
            const data = store.findings5r;
            if (data.length === 0) { showToast('TIDAK ADA DATA', 'error'); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text('LAPORAN TEMUAN 5R', 105, 15, { align: 'center' });
            doc.setFontSize(10);
            doc.text(`Total: ${data.length}`, 105, 25, { align: 'center' });
            let y = 40;
            doc.setFontSize(7);
            data.forEach((f, i) => {
                if (y > 280) { doc.addPage(); y = 20; }
                doc.text(`${i+1}. ${f.auditor_name||'-'} | ${f.area_name||'-'} | ${f.status||'open'}`, 15, y);
                const desc = f.temuan || '-';
                const lines = doc.splitTextToSize(desc, 180);
                lines.forEach((line, idx) => { if (y > 280) { doc.addPage(); y = 20; } doc.text(line, 20, y + 4 + idx * 4); });
                y += lines.length * 4 + 6;
            });
            doc.save(`5R_TEMUAN_${new Date().toISOString().split('T')[0]}.pdf`);
            showToast('PDF 5R EXPORT', 'success');
        }

        function exportExcel5r() {
            const data = store.findings5r;
            if (data.length === 0) { showToast('TIDAK ADA DATA', 'error'); return; }
            const excelData = data.map((f, i) => ({
                NO: i+1, TANGGAL: f.date||'-', AUDITOR: f.auditor_name||'-',
                AUDITEE: f.auditee_name||'-', AREA: f.area_name||'-',
                'SUB AREA': f.subarea||'-', TEMUAN: f.temuan||'-',
                STATUS: f.status||'open', 'CLOSED BY': f.closed_by||'-'
            }));
            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "5R");
            XLSX.writeFile(wb, `5R_TEMUAN_${new Date().toISOString().split('T')[0]}.xlsx`);
            showToast('EXCEL 5R EXPORT', 'success');
        }

                        </div>
                        <div id="mgmt-targets" class="mgmt-content hidden">
                            <div class="flex gap-3 mb-4"><input type="month" id="new-target-month" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-${color}-500"> <input type="number" id="new-target-value" placeholder="TARGET" min="1" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-${color}-500"> <button id="add-target" class="${isBrft ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-purple-600 hover:bg-purple-700'} px-4 py-2 rounded-lg text-sm font-medium">➕</button></div>
                            <div id="targets-list" class="space-y-2 max-h-64 overflow-y-auto"></div>
                        </div>` : ''}
                    </div>
                </div>
            `;

            document.querySelectorAll('.mgmt-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.mgmt-tab').forEach(t => {
                        t.classList.remove('mgmt-tab-active', 'border-emerald-500', 'border-purple-500', 'text-emerald-400', 'text-purple-400');
                        t.classList.add('text-gray-400');
                    });
                    this.classList.add('mgmt-tab-active', isBrft ? 'border-emerald-500' : 'border-purple-500', colorClass);
                    this.classList.remove('text-gray-400');
                    document.querySelectorAll('.mgmt-content').forEach(c => c.classList.add('hidden'));
                    const target = document.getElementById(`mgmt-${this.dataset.mgmt}`);
                    if (target) target.classList.remove('hidden');
                });
            });

            document.getElementById('admin-login-btn').addEventListener('click', () => {
                if (document.getElementById('admin-password').value === 'admin123') {
                    isAdminLoggedIn = true;
                    document.getElementById('admin-login').classList.add('hidden');
                    document.getElementById('admin-panel').classList.remove('hidden');
                    showToast('LOGIN BERHASIL', 'success');
                    updateManagementData();
                } else {
                    showToast('PASSWORD SALAH', 'error');
                }
            });

            document.getElementById('admin-logout').addEventListener('click', () => {
                isAdminLoggedIn = false;
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('admin-login').classList.remove('hidden');
                document.getElementById('admin-password').value = '';
                showToast('LOGOUT', 'info');
            });

            document.getElementById('add-analyst').addEventListener('click', () => {
                const input = document.getElementById('new-analyst');
                const value = input.value.trim().toUpperCase();
                if (!value) { showToast('ISI NILAI', 'error'); return; }
                if (store.analysts.some(a => a.name === value)) { showToast('SUDAH ADA', 'error'); return; }
                store.analysts.push({ id: DB.id(), name: value });
                saveStore();
                addAuditLog('CREATE', `NEW ANALYST: ${value}`);
                showToast('ANALYST BERHASIL', 'success');
                input.value = '';
                updateManagementData();
            });

            if (isBrft) {
                document.getElementById('add-product').addEventListener('click', () => {
                    const input = document.getElementById('new-product');
                    const value = input.value.trim().toUpperCase();
                    if (!value) { showToast('ISI NILAI', 'error'); return; }
                    if (store.products.some(p => p.name === value)) { showToast('SUDAH ADA', 'error'); return; }
                    store.products.push({ id: DB.id(), name: value, parameters: [] });
                    saveStore();
                    addAuditLog('CREATE', `NEW PRODUCT: ${value}`);
                    showToast('PRODUK BERHASIL', 'success');
                    input.value = '';
                    updateManagementData();
                });

                document.getElementById('add-category').addEventListener('click', () => {
                    const input = document.getElementById('new-category');
                    const value = input.value.trim().toUpperCase();
                    if (!value) { showToast('ISI NILAI', 'error'); return; }
                    if (store.categories.some(c => c.name === value)) { showToast('SUDAH ADA', 'error'); return; }
                    store.categories.push({ id: DB.id(), name: value });
                    saveStore();
                    addAuditLog('CREATE', `NEW CATEGORY: ${value}`);
                    showToast('KATEGORI BERHASIL', 'success');
                    input.value = '';
                    updateManagementData();
                });

                document.getElementById('add-target').addEventListener('click', () => {
                    const month = document.getElementById('new-target-month').value;
                    const value = parseInt(document.getElementById('new-target-value').value);
                    if (!month || isNaN(value) || value <= 0) { showToast('DATA TIDAK VALID', 'error'); return; }
                    if (store.targets.some(t => t.target_month === month)) { showToast('BULAN SUDAH ADA', 'error'); return; }
                    store.targets.push({ id: DB.id(), target_month: month, target_value: value });
                    saveStore();
                    addAuditLog('CREATE', `NEW TARGET: ${month}`);
                    showToast('TARGET BERHASIL', 'success');
                    document.getElementById('new-target-month').value = '';
                    document.getElementById('new-target-value').value = '';
                    updateManagementData();
                });
            }

            updateManagementData();
        }

        function updateManagementData() {
            const isBrft = currentProject === 'brft';
            const analystsList = document.getElementById('analysts-list');
            if (analystsList) {
                analystsList.innerHTML = store.analysts.length === 0 ? '<p class="text-gray-500 text-center py-4">TIDAK ADA</p>' :
                    store.analysts.map(a => {
                        const areas = store.areas.filter(area => area.analyst_id === a.id);
                        const areasHtml = areas.length === 0 ? '<div class="text-gray-500 text-xs ml-4">BELUM ADA AREA</div>' :
                            areas.map(area => `<div class="area-item bg-gray-700/50 rounded px-3 py-2 mt-1">
                                <div class="flex items-center justify-between"><span class="text-emerald-300 font-medium">${area.name}</span>
                                <div class="flex gap-1">
                                    <button class="add-subarea-btn text-purple-400 hover:text-purple-300 p-1 text-xs" data-id="${area.id}">➕ SUB</button>
                                    <button class="edit-area text-blue-400 hover:text-blue-300 p-1 text-xs" data-id="${area.id}">✏️</button>
                                    <button class="delete-area text-red-400 hover:text-red-300 p-1 text-xs" data-id="${area.id}">🗑️</button>
                                </div></div>
                                <div class="flex flex-wrap gap-1 mt-1">${area.subareas && area.subareas.length > 0 ? area.subareas.map(s => `<span class="subarea-badge">${s}</span>`).join(' ') : '<span class="text-gray-400 text-xs">BELUM ADA SUB</span>'}</div>
                            </div>`).join('');
                        return `<div class="analyst-list-item bg-gray-700 rounded-lg px-4 py-3">
                            <div class="flex items-center justify-between"><span class="font-bold text-emerald-400">${a.name}</span>
                            <div class="flex gap-2">
                                <button class="add-area-btn text-blue-400 hover:text-blue-300 p-1 text-xs" data-id="${a.id}">➕ AREA</button>
                                <button class="edit-analyst text-blue-400 hover:text-blue-300 p-1" data-id="${a.id}">✏️</button>
                                <button class="delete-analyst text-red-400 hover:text-red-300 p-1" data-id="${a.id}">🗑️</button>
                            </div></div>
                            <div class="mt-2 ml-2 border-l-2 border-gray-600 pl-2">${areasHtml}</div>
                        </div>`;
                    }).join('');
            }

            if (isBrft) {
                const productsList = document.getElementById('products-list');
                if (productsList) {
                    productsList.innerHTML = store.products.length === 0 ? '<p class="text-gray-500 text-center py-4">TIDAK ADA</p>' :
                        store.products.map(p => `<div class="flex items-center justify-between bg-gray-700 rounded-lg px-4 py-3" data-id="${p.id}">
                            <span class="font-medium text-emerald-400">${p.name}</span>
                            <div class="flex gap-2"><button class="edit-product text-blue-400 hover:text-blue-300 p-1" data-id="${p.id}">✏️</button><button class="delete-product text-red-400 hover:text-red-300 p-1" data-id="${p.id}">🗑️</button></div>
                        </div>`).join('');
                }
                const categoriesList = document.getElementById('categories-list');
                if (categoriesList) {
                    categoriesList.innerHTML = store.categories.length === 0 ? '<p class="text-gray-500 text-center py-4">TIDAK ADA</p>' :
                        store.categories.map(c => `<div class="flex items-center justify-between bg-gray-700 rounded-lg px-4 py-3" data-id="${c.id}">
                            <span class="font-medium">${c.name}</span>
                            <div class="flex gap-2"><button class="edit-category text-blue-400 hover:text-blue-300 p-1" data-id="${c.id}">✏️</button><button class="delete-category text-red-400 hover:text-red-300 p-1" data-id="${c.id}">🗑️</button></div>
                        </div>`).join('');
                }
                const targetsList = document.getElementById('targets-list');
                if (targetsList) {
                    targetsList.innerHTML = store.targets.length === 0 ? '<p class="text-gray-500 text-center py-4">TIDAK ADA</p>' :
                        store.targets.sort((a,b) => b.target_month.localeCompare(a.target_month)).map(t =>
                            `<div class="flex items-center justify-between bg-gray-700 rounded-lg px-4 py-3" data-id="${t.id}">
                                <span class="font-medium">${t.target_month} = ${t.target_value}</span>
                                <div class="flex gap-2"><button class="edit-target text-blue-400 hover:text-blue-300 p-1" data-id="${t.id}">✏️</button><button class="delete-target text-red-400 hover:text-red-300 p-1" data-id="${t.id}">🗑️</button></div>
                            </div>`
                        ).join('');
                }
            }

            setupManagementEvents();
        }

        function setupManagementEvents() {
            document.querySelectorAll('.add-area-btn').forEach(btn => {
                btn.removeEventListener('click', handleAddArea);
                btn.addEventListener('click', handleAddArea);
            });
            document.querySelectorAll('.add-subarea-btn').forEach(btn => {
                btn.removeEventListener('click', handleAddSubarea);
                btn.addEventListener('click', handleAddSubarea);
            });
            document.querySelectorAll('.edit-analyst, .edit-product, .edit-category, .edit-area, .edit-target').forEach(btn => {
                btn.removeEventListener('click', handleEdit);
                btn.addEventListener('click', handleEdit);
            });
            document.querySelectorAll('.delete-analyst, .delete-product, .delete-category, .delete-area, .delete-target').forEach(btn => {
                btn.removeEventListener('click', handleDelete);
                btn.addEventListener('click', handleDelete);
            });
        }

        function handleAddArea(e) {
            const analystId = e.currentTarget.dataset.id;
            document.getElementById('edit-value').placeholder = 'NAMA AREA';
            document.getElementById('edit-value').value = '';
            document.getElementById('edit-modal').classList.remove('hidden');
            editCallback = () => {
                const name = document.getElementById('edit-value').value.trim().toUpperCase();
                if (!name) { showToast('ISI NAMA', 'error'); return; }
                if (store.areas.some(a => a.name === name && a.analyst_id === analystId)) { showToast('SUDAH ADA', 'error'); return; }
                store.areas.push({ id: DB.id(), name, analyst_id: analystId, subareas: [] });
                saveStore();
                addAuditLog('CREATE', `NEW AREA: ${name}`);
                showToast('AREA BERHASIL', 'success');
                document.getElementById('edit-modal').classList.add('hidden');
                updateManagementData();
            };
            document.getElementById('confirm-edit').onclick = editCallback;
        }

        function handleAddSubarea(e) {
            const areaId = e.currentTarget.dataset.id;
            document.getElementById('edit-value').placeholder = 'NAMA SUB AREA';
            document.getElementById('edit-value').value = '';
            document.getElementById('edit-modal').classList.remove('hidden');
            editCallback = () => {
                const name = document.getElementById('edit-value').value.trim().toUpperCase();
                if (!name) { showToast('ISI NAMA', 'error'); return; }
                const area = store.areas.find(a => a.id === areaId);
                if (!area) { showToast('AREA TIDAK DITEMUKAN', 'error'); return; }
                if (!area.subareas) area.subareas = [];
                if (area.subareas.includes(name)) { showToast('SUDAH ADA', 'error'); return; }
                area.subareas.push(name);
                saveStore();
                addAuditLog('UPDATE', `ADD SUBAREA: ${name}`);
                showToast('SUB AREA BERHASIL', 'success');
                document.getElementById('edit-modal').classList.add('hidden');
                updateManagementData();
            };
            document.getElementById('confirm-edit').onclick = editCallback;
        }

        function handleEdit(e) {
            const btn = e.currentTarget;
            const type = btn.className.includes('edit-analyst') ? 'analyst' :
                         btn.className.includes('edit-product') ? 'product' :
                         btn.className.includes('edit-category') ? 'category' :
                         btn.className.includes('edit-area') ? 'area' :
                         btn.className.includes('edit-target') ? 'target' : null;
            const id = btn.dataset.id;
            if (type === 'target') {
                const target = store.targets.find(t => t.id === id);
                if (!target) return;
                document.getElementById('edit-value').placeholder = 'NILAI TARGET';
                document.getElementById('edit-value').value = target.target_value || '';
                document.getElementById('edit-modal').classList.remove('hidden');
                editCallback = () => {
                    const val = parseInt(document.getElementById('edit-value').value);
                    if (isNaN(val) || val <= 0) { showToast('NILAI TIDAK VALID', 'error'); return; }
                    target.target_value = val;
                    saveStore();
                    addAuditLog('UPDATE', `TARGET ${target.target_month}: ${val}`);
                    showToast('TARGET UPDATED', 'success');
                    document.getElementById('edit-modal').classList.add('hidden');
                    updateManagementData();
                };
                document.getElementById('confirm-edit').onclick = editCallback;
                return;
            }
            let item = null; let label = '';
            if (type === 'analyst') { item = store.analysts.find(a => a.id === id); label = 'INISIAL'; }
            else if (type === 'product') { item = store.products.find(p => p.id === id); label = 'KODE PRODUK'; }
            else if (type === 'category') { item = store.categories.find(c => c.id === id); label = 'KATEGORI'; }
            else if (type === 'area') { item = store.areas.find(a => a.id === id); label = 'AREA'; }
            if (!item) return;
            document.getElementById('edit-value').placeholder = label;
            document.getElementById('edit-value').value = item.name || '';
            document.getElementById('edit-modal').classList.remove('hidden');
            editCallback = () => {
                const newValue = document.getElementById('edit-value').value.trim().toUpperCase();
                if (!newValue) { showToast('ISI NILAI', 'error'); return; }
                item.name = newValue;
                saveStore();
                addAuditLog('UPDATE', `${type}: ${newValue}`);
                showToast('UPDATED', 'success');
                document.getElementById('edit-modal').classList.add('hidden');
                updateManagementData();
            };
            document.getElementById('confirm-edit').onclick = editCallback;
        }

        function handleDelete(e) {
            const btn = e.currentTarget;
            const id = btn.dataset.id;
            const type = btn.className.includes('delete-analyst') ? 'analyst' :
                         btn.className.includes('delete-product') ? 'product' :
                         btn.className.includes('delete-category') ? 'category' :
                         btn.className.includes('delete-area') ? 'area' :
                         btn.className.includes('delete-target') ? 'target' : null;
            document.getElementById('delete-modal').classList.remove('hidden');
            deleteCallback = () => {
                let item = null; let name = '';
                if (type === 'analyst') { item = store.analysts.find(a => a.id === id); if (item) { name = item.name; store.analysts = store.analysts.filter(a => a.id !== id); } }
                else if (type === 'product') { item = store.products.find(p => p.id === id); if (item) { name = item.name; store.products = store.products.filter(p => p.id !== id); } }
                else if (type === 'category') { item = store.categories.find(c => c.id === id); if (item) { name = item.name; store.categories = store.categories.filter(c => c.id !== id); } }
                else if (type === 'area') { item = store.areas.find(a => a.id === id); if (item) { name = item.name; store.areas = store.areas.filter(a => a.id !== id); } }
                else if (type === 'target') { item = store.targets.find(t => t.id === id); if (item) { name = item.target_month; store.targets = store.targets.filter(t => t.id !== id); } }
                if (item) { saveStore(); addAuditLog('DELETE', `DELETED ${type}: ${name}`); showToast('DATA DIHAPUS', 'success'); document.getElementById('delete-modal').classList.add('hidden'); updateManagementData(); }
            };
            document.getElementById('confirm-delete').onclick = deleteCallback;
        }

        document.getElementById('cancel-delete').addEventListener('click', () => { document.getElementById('delete-modal').classList.add('hidden'); });
        document.getElementById('cancel-edit').addEventListener('click', () => { document.getElementById('edit-modal').classList.add('hidden'); });

        // ============================================================
        // DATE/TIME
        // ============================================================
        function updateDateTime() {
            const d = document.getElementById('current-date');
            const t = document.getElementById('current-time');
            if (d) d.textContent = new Date().toLocaleDateString('ID-id', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
            if (t) t.textContent = new Date().toLocaleTimeString('ID-id', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ============================================================
        // INIT
        // ============================================================
        function init() {
            loadStore();
            console.log('✅ BRFT + 5R System initialized');
        }
        init();
    </script>
</body>
</html>
