<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC MONITORING SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { box-sizing: border-box; }
        * { font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        .toast {
            position: fixed; top: 20px; right: 20px; padding: 16px 24px;
            border-radius: 8px; z-index: 9999; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .trend-table th {
            background-color: #374151;
            color: #e5e7eb;
            font-size: 0.75rem;
            padding: 0.75rem 0.5rem;
            text-align: center;
            border-right: 1px solid #4b5563;
        }
        .trend-table td {
            padding: 0.6rem 0.5rem;
            text-align: center;
            border-right: 1px solid #4b5563;
            border-bottom: 1px solid #374151;
        }
        .trend-table tr:hover { background-color: #374151; }
        .item-badge {
            background-color: #1e3a5f;
            color: #93c5fd;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .product-badge { background-color: #3b2e5f; color: #c4b5fd; }
        .category-badge { background-color: #1e4a4a; color: #99f6e4; }
        .parameter-tag {
            display: inline-block;
            background-color: #1e3a5f;
            color: #93c5fd;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            margin: 0.1rem 0.2rem;
        }
        .photo-thumb {
            width: 50px; height: 50px; object-fit: cover;
            border-radius: 4px; cursor: pointer;
        }
    </style>
</head>
