<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRFT & 5R SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { box-sizing: border-box; margin: 0; }
        * { font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        .toast {
            position: fixed; top: 20px; right: 20px; padding: 16px 24px;
            border-radius: 8px; z-index: 9999; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; }
        .card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        .trend-table th {
            background-color: #374151;
            color: #e5e7eb;
            font-size: 0.75rem;
            padding: 0.75rem 0.5rem;
            text-align: center;
            border-right: 1px solid #4b5563;
        }
        .trend-table td {
            padding: 0.6rem 0.5rem;
            text-align: center;
            border-right: 1px solid #4b5563;
            border-bottom: 1px solid #374151;
        }
        .trend-table tr:hover { background-color: #374151; }
        .item-badge {
            background-color: #1e3a5f;
            color: #93c5fd;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .product-badge { background-color: #3b2e5f; color: #c4b5fd; }
        .category-badge { background-color: #1e4a4a; color: #99f6e4; }
        .parameter-tag {
            display: inline-block;
            background-color: #1e3a5f;
            color: #93c5fd;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            margin: 0.1rem 0.2rem;
        }
        .photo-thumb {
            width: 50px; height: 50px; object-fit: cover;
            border-radius: 4px; cursor: pointer;
        }
        .mgmt-tab-active { border-bottom: 2px solid #10b981; color: #10b981; }
        .area-badge {
            background-color: #1e3a5f;
            color: #93c5fd;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            margin: 0.1rem 0.2rem;
        }
        .subarea-badge {
            background-color: #3b2e5f;
            color: #c4b5fd;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.6rem;
            margin: 0.05rem 0.1rem;
        }
        .analyst-list-item {
            border-left: 3px solid #10b981;
            margin-bottom: 0.75rem;
        }
        .area-item {
            border-left: 3px solid #8b5cf6;
            margin-left: 1rem;
            margin-top: 0.25rem;
            margin-bottom: 0.25rem;
        }
        .subarea-item {
            border-left: 3px solid #f59e0b;
            margin-left: 2rem;
            margin-top: 0.15rem;
            margin-bottom: 0.15rem;
            font-size: 0.8rem;
        }
        .temuan-item {
            background-color: #1f2937;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #8b5cf6;
        }
        .temuan-item .remove-temuan {
            cursor: pointer;
            color: #ef4444;
            font-size: 0.75rem;
            transition: color 0.2s;
        }
        .temuan-item .remove-temuan:hover { color: #f87171; }
        .project-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .hidden-project { display: none !important; }
        .project-selector { background: #0f172a; }
    </style>
</head>
<body class="h-full bg-gray-900 text-gray-100">
    <div id="app" class="h-full w-full flex flex-col overflow-auto">
        <!-- Header -->
        <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-4">
                <div id="project-icon" class="w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <div>
                    <h1 id="app-title" class="text-xl font-bold text-emerald-400">BRFT SYSTEM</h1>
                    <p id="company-name" class="text-xs text-gray-400">Created by MSTD</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div id="current-date" class="text-sm text-gray-400 font-medium"></div>
                    <div id="current-time" class="text-xs text-emerald-400 font-bold tracking-wider mt-1"></div>
                </div>
                <button id="theme-toggle" class="p-2 rounded-lg bg-gray-700 hover:bg-gray-600 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                </button>
            </div>
        </header>

        <!-- Project Selector -->
        <div id="project-selector" class="project-selector p-8 flex items-center justify-center gap-8 flex-1">
            <div class="project-card bg-gray-800 rounded-2xl p-8 w-64 text-center border-2 border-emerald-500/30 hover:border-emerald-400" data-project="brft">
                <div class="w-24 h-24 bg-emerald-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-12 h-12 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                </div>
                <h2 class="text-2xl font-bold text-emerald-400">BRFT</h2>
                <p class="text-gray-400 text-sm mt-2">Quality Control Monitoring</p>
            </div>
            <div class="project-card bg-gray-800 rounded-2xl p-8 w-64 text-center border-2 border-purple-500/30 hover:border-purple-400" data-project="5r">
                <div class="w-24 h-24 bg-purple-600/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-12 h-12 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
                </div>
                <h2 class="text-2xl font-bold text-purple-400">5R</h2>
                <p class="text-gray-400 text-sm mt-2">5R Audit Monitoring</p>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <nav id="main-nav" class="bg-gray-800 border-b border-gray-700 px-6 flex-shrink-0 hidden">
            <div class="flex gap-1 overflow-x-auto" id="nav-tabs">
                <button class="tab-btn tab-active px-4 py-3 text-sm font-medium transition hover:text-emerald-400" data-tab="dashboard"> 📊 DASHBOARD </button>
                <button class="tab-btn px-4 py-3 text-sm font-medium text-gray-400 transition hover:text-emerald-400" data-tab="input"> ➕ INPUT </button>
                <button class="tab-btn px-4 py-3 text-sm font-medium text-gray-400 transition hover:text-emerald-400" data-tab="management"> ⚙️ MANAGEMENT </button>
                <button id="back-to-projects" class="px-4 py-3 text-sm font-medium text-gray-400 transition hover:text-blue-400 ml-auto"> 🏠 PROJECTS </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 p-6 overflow-auto hidden">
            <!-- Dashboard Tab -->
            <div id="dashboard-tab" class="tab-content">
                <!-- Summary Cards -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" id="summary-cards">
                    <!-- Dynamic summary cards -->
                </div>

                <!-- Filters -->
                <div class="bg-gray-800 rounded-xl p-4 mb-6 card-shadow border border-gray-700" id="filter-section">
                    <!-- Dynamic filters -->
                </div>

                <!-- Charts -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6" id="chart-section">
                    <!-- Dynamic charts -->
                </div>

                <!-- Data Table -->
                <div class="bg-gray-800 rounded-xl p-5 card-shadow border border-gray-700" id="table-section">
                    <!-- Dynamic table -->
                </div>
            </div>

            <!-- Input Tab -->
            <div id="input-tab" class="tab-content hidden">
                <!-- Dynamic input form -->
            </div>

            <!-- Management Tab -->
            <div id="management-tab" class="tab-content hidden">
                <!-- Dynamic management -->
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-xl p-6 max-w-md w-full mx-4 border border-gray-700">
            <h3 class="text-lg font-bold text-white mb-2">⚠️ KONFIRMASI HAPUS</h3>
            <p id="delete-message" class="text-gray-400 mb-6">APAKAH ANDA YAKIN INGIN MENGHAPUS DATA INI?</p>
            <div class="flex gap-3"><button id="confirm-delete" class="flex-1 bg-red-600 hover:bg-red-700 py-2 rounded-lg font-medium transition">🗑️ HAPUS</button> <button id="cancel-delete" class="flex-1 bg-gray-600 hover:bg-gray-500 py-2 rounded-lg font-medium transition">❌ BATAL</button></div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-xl p-6 max-w-md w-full mx-4 border border-gray-700">
            <h3 class="text-lg font-bold text-white mb-4">✏️ EDIT DATA</h3>
            <div class="mb-4"><label class="block text-xs text-gray-400 mb-1">NILAI BARU</label> <input type="text" id="edit-value" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 focus:ring-2 focus:ring-emerald-500"></div>
            <div class="flex gap-3"><button id="confirm-edit" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-2 rounded-lg font-medium transition">💾 SIMPAN</button> <button id="cancel-edit" class="flex-1 bg-gray-600 hover:bg-gray-500 py-2 rounded-lg font-medium transition">❌ BATAL</button></div>
        </div>
    </div>

    <script>
        // ============================================================
        // STORAGE WITH FALLBACK
        // ============================================================
        let memoryStore = {};

        function isLocalStorageAvailable() {
            try {
                const test = 'test_' + Date.now();
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return true;
            } catch {
                return false;
            }
        }

        const USE_LOCAL_STORAGE = isLocalStorageAvailable();

        const DB = {
            get(key, defaultVal = null) {
                if (USE_LOCAL_STORAGE) {
                    try {
                        const data = localStorage.getItem('qc_' + key);
                        return data ? JSON.parse(data) : defaultVal;
                    } catch { return defaultVal; }
                }
                return memoryStore[key] !== undefined ? memoryStore[key] : defaultVal;
            },
            set(key, value) {
                if (USE_LOCAL_STORAGE) {
                    try {
                        localStorage.setItem('qc_' + key, JSON.stringify(value));
                    } catch (e) {
                        console.warn('localStorage write failed, using memory:', e);
                        memoryStore[key] = value;
                    }
                } else {
                    memoryStore[key] = value;
                }
            },
            id() {
                return Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            }
        };

        console.log('📦 Storage mode:', USE_LOCAL_STORAGE ? 'localStorage' : 'Memory (fallback)');

        // ============================================================
        // DATA STORE
        // ============================================================
        let store = {
            findings: [],        // BRFT/QC findings
            findings5r: [],      // 5R findings
            analysts: [],        // inisial
            products: [],
            categories: [],
            targets: [],
            areas: [],
            auditLogs: []
        };

        function loadStore() {
            store.findings = DB.get('findings', []);
            store.findings5r = DB.get('findings5r', []);
            store.analysts = DB.get('analysts', []);
            store.products = DB.get('products', []);
            store.categories = DB.get('categories', []);
            store.targets = DB.get('targets', []);
            store.areas = DB.get('areas', []);
            store.auditLogs = DB.get('auditLogs', []);
        }

        function saveStore() {
            DB.set('findings', store.findings);
            DB.set('findings5r', store.findings5r);
            DB.set('analysts', store.analysts);
            DB.set('products', store.products);
            DB.set('categories', store.categories);
            DB.set('targets', store.targets);
            DB.set('areas', store.areas);
            DB.set('auditLogs', store.auditLogs);
        }

        // ============================================================
        // APPLICATION STATE
        // ============================================================
        let currentProject = null; // 'brft' or '5r'
        let isAdminLoggedIn = false;
        let deleteCallback = null;
        let editCallback = null;
        let charts = {};
        let currentFilteredFindings = [];
        let temuan5rItems = [];

        const selectedFilters = {
            products: new Set(),
            categories: new Set(),
            analysts: new Set()
        };

        // ============================================================
        // UTILITY FUNCTIONS
        // ============================================================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'} text-white`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function addAuditLog(action, details, product = '', category = '', analyst = '') {
            store.auditLogs.unshift({
                id: DB.id(),
                created_at: new Date().toISOString(),
                action: action,
                details: details,
                product: product || null,
                category: category || null,
                analyst: analyst || null
            });
            if (store.auditLogs.length > 1000) store.auditLogs = store.auditLogs.slice(0, 1000);
            saveStore();
        }

        function getProductName(id) {
            const p = store.products.find(x => x.id === id);
            return p ? p.name : id;
        }

        function getCategoryName(id) {
            const c = store.categories.find(x => x.id === id);
            return c ? c.name : id;
        }

        function getAnalystName(id) {
            const a = store.analysts.find(x => x.id === id);
            return a ? a.name : id;
        }

        function getProductParameters(productId) {
            const p = store.products.find(x => x.id === productId);
            return p ? p.parameters || [] : [];
        }

        function getAreaName(id) {
            const a = store.areas.find(x => x.id === id);
            return a ? a.name : id;
        }

        function getSubAreas(areaId) {
            const a = store.areas.find(x => x.id === areaId);
            return a ? a.subareas || [] : [];
        }

        // ============================================================
        // PROJECT SELECTOR
        // ============================================================
        document.querySelectorAll('.project-card').forEach(card => {
            card.addEventListener('click', function() {
                const project = this.dataset.project;
                currentProject = project;
                document.getElementById('project-selector').classList.add('hidden');
                document.getElementById('main-nav').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                
                // Update header
                const title = document.getElementById('app-title');
                const icon = document.getElementById('project-icon');
                if (project === 'brft') {
                    title.textContent = 'BRFT SYSTEM';
                    title.className = 'text-xl font-bold text-emerald-400';
                    icon.className = 'w-10 h-10 bg-emerald-600 rounded-lg flex items-center justify-center';
                    document.querySelector('#project-icon svg').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />';
                } else {
                    title.textContent = '5R SYSTEM';
                    title.className = 'text-xl font-bold text-purple-400';
                    icon.className = 'w-10 h-10 bg-purple-600 rounded-lg flex items-center justify-center';
                    document.querySelector('#project-icon svg').innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />';
                }
                
                // Update navigation tabs
                updateNavTabs(project);
                
                // Load project data
                loadProject(project);
            });
        });

        document.getElementById('back-to-projects').addEventListener('click', function() {
            currentProject = null;
            document.getElementById('project-selector').classList.remove('hidden');
            document.getElementById('main-nav').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            // Destroy charts
            Object.keys(charts).forEach(key => {
                if (charts[key]) {
                    charts[key].destroy();
                    delete charts[key];
                }
            });
        });

        // ============================================================
        // NAVIGATION TABS
        // ============================================================
        function updateNavTabs(project) {
            const navTabs = document.getElementById('nav-tabs');
            const tabs = navTabs.querySelectorAll('.tab-btn');
            
            if (project === 'brft') {
                tabs.forEach(tab => {
                    const tabName = tab.dataset.tab;
                    if (tabName === 'dashboard') {
                        tab.textContent = ' 📊 DASHBOARD QC';
                        tab.style.display = '';
                    } else if (tabName === 'input') {
                        tab.textContent = ' ➕ INPUT QC';
                        tab.style.display = '';
                    } else if (tabName === 'management') {
                        tab.textContent = ' ⚙️ MANAGEMENT';
                        tab.style.display = '';
                    }
                });
                // Activate first tab
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-emerald-400'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('text-gray-400'));
                document.querySelector('.tab-btn[data-tab="dashboard"]').classList.add('tab-active', 'text-emerald-400');
                document.querySelector('.tab-btn[data-tab="dashboard"]').classList.remove('text-gray-400');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById('dashboard-tab').classList.remove('hidden');
            } else {
                tabs.forEach(tab => {
                    const tabName = tab.dataset.tab;
                    if (tabName === 'dashboard') {
                        tab.textContent = ' 📊 DASHBOARD 5R';
                        tab.style.display = '';
                    } else if (tabName === 'input') {
                        tab.textContent = ' ➕ INPUT 5R';
                        tab.style.display = '';
                    } else if (tabName === 'management') {
                        tab.textContent = ' ⚙️ MANAGEMENT';
                        tab.style.display = '';
                    }
                });
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-purple-400'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('text-gray-400'));
                document.querySelector('.tab-btn[data-tab="dashboard"]').classList.add('tab-active', 'text-purple-400');
                document.querySelector('.tab-btn[data-tab="dashboard"]').classList.remove('text-gray-400');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById('dashboard-tab').classList.remove('hidden');
            }
        }

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (!currentProject) return;
                
                const tab = this.dataset.tab;
                const isBrft = currentProject === 'brft';
                const colorClass = isBrft ? 'text-emerald-400' : 'text-purple-400';
                const borderClass = isBrft ? 'border-emerald-500' : 'border-purple-500';
                
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('tab-active', 'text-emerald-400', 'text-purple-400', borderClass);
                    b.classList.add('text-gray-400');
                });
                this.classList.add('tab-active', colorClass);
                this.classList.remove('text-gray-400');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                document.getElementById(`${tab}-tab`).classList.remove('hidden');
                
                if (tab === 'dashboard') {
                    if (currentProject === 'brft') loadDashboardBrft();
                    else loadDashboard5r();
                } else if (tab === 'input') {
                    if (currentProject === 'brft') loadInputFormBrft();
                    else loadInputForm5r();
                } else if (tab === 'management') {
                    loadManagement();
                }
            });
        });

        // ============================================================
        // LOAD PROJECT
        // ============================================================
        function loadProject(project) {
            if (project === 'brft') {
                loadDashboardBrft();
            } else {
                loadDashboard5r();
            }
        }

        // ============================================================
        // LOAD DASHBOARD BRFT
        // ============================================================
        function loadDashboardBrft() {
            // Summary Cards
            const summaryHTML = `
                <div class="bg-gray-800 rounded-xl p-5 card-shadow border border-gray-700">
                    <div class="flex items-center justify-between">
                        <div><p class="text-xs text-gray-400 mb-1">Σ TEMUAN QC</p><p id="total-findings" class="text-3xl font-bold text-white">${store.findings.length}</p></div>
                        <div class="w-12 h-12 bg-red-500/20 rounded-xl flex items-center justify-center">
                            <svg class="w-6 h-6 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                        </div>
                    </div>
                </div>

        // ============================================================
        // DASHBOARD BRFT UPDATE
        // ============================================================
        function updateDashboardBrft() {
            const now = new Date();
            const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

            let filtered = [...store.findings];
            const dateFrom = document.getElementById('filter-date-from')?.value;
            const dateTo = document.getElementById('filter-date-to')?.value;

            if (dateFrom) filtered = filtered.filter(f => f.date >= dateFrom);
            if (dateTo) filtered = filtered.filter(f => f.date <= dateTo);

            if (selectedFilters.products.size > 0) {
                filtered = filtered.filter(f => selectedFilters.products.has(f.product_name));
            }
            if (selectedFilters.categories.size > 0) {
                filtered = filtered.filter(f => selectedFilters.categories.has(f.category_name));
            }
            if (selectedFilters.analysts.size > 0) {
                filtered = filtered.filter(f => selectedFilters.analysts.has(f.analyst_name));
            }

            currentFilteredFindings = filtered;

            const totalFindings = document.getElementById('total-findings');
            const uniqueBatches = document.getElementById('unique-batches');
            const targetDocs = document.getElementById('target-docs');
            const qcPercentage = document.getElementById('qc-percentage');
            const qcIndicator = document.getElementById('qc-indicator');

            if (totalFindings) totalFindings.textContent = filtered.length;
            const uniqueBatchSet = new Set(filtered.map(f => f.batch_number).filter(b => b));
            if (uniqueBatches) uniqueBatches.textContent = uniqueBatchSet.size;

            let targetValue = 0;
            let uniqueBatchesForQC = 0;
            let isValidForQC = false;
            let coveredMonths = [];

            if (dateFrom && dateTo) {
                const fromDate = new Date(dateFrom);
                const toDate = new Date(dateTo);
                let currentDate = new Date(fromDate.getFullYear(), fromDate.getMonth(), 1);
                while (currentDate <= toDate) {
                    const monthKey = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
                    const firstDayStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-01`;
                    const lastDayOfMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
                    const lastDayStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}-${String(lastDayOfMonth.getDate()).padStart(2, '0')}`;
                    const isFullMonth = dateFrom <= firstDayStr && dateTo >= lastDayStr;
                    if (isFullMonth && !coveredMonths.includes(monthKey)) {
                        coveredMonths.push(monthKey);
                    }
                    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
                }
                if (coveredMonths.length > 0) {
                    isValidForQC = true;
                    const uniqueBatchSet2 = new Set(filtered.map(f => f.batch_number).filter(b => b));
                    uniqueBatchesForQC = uniqueBatchSet2.size;
                    coveredMonths.forEach(month => {
                        const monthTarget = store.targets.find(t => t.target_month === month);
                        if (monthTarget) targetValue += monthTarget.target_value;
                    });
                }
            } else if (!dateFrom && !dateTo) {
                isValidForQC = true;
                const uniqueBatchSet2 = new Set(filtered.map(f => f.batch_number).filter(b => b));
                uniqueBatchesForQC = uniqueBatchSet2.size;
                const monthTarget = store.targets.find(t => t.target_month === currentMonth);
                targetValue = monthTarget ? monthTarget.target_value : 0;
            }

            if (targetDocs) targetDocs.textContent = isValidForQC ? targetValue : '-';

            const qcPercent = isValidForQC && targetValue > 0 ? ((targetValue - uniqueBatchesForQC) / targetValue) * 100 : null;

            if (qcPercentage) {
                if (qcPercent !== null) {
                    qcPercentage.textContent = qcPercent.toFixed(1) + '%';
                    if (qcPercent >= 100) {
                        qcPercentage.className = 'text-3xl font-bold text-emerald-400';
                        if (qcIndicator) qcIndicator.className = 'w-12 h-12 bg-emerald-500/20 rounded-xl flex items-center justify-center';
                    } else {
                        qcPercentage.className = 'text-3xl font-bold text-red-400';
                        if (qcIndicator) qcIndicator.className = 'w-12 h-12 bg-red-500/20 rounded-xl flex items-center justify-center';
                    }
                } else {
                    qcPercentage.textContent = '-';
                    qcPercentage.className = 'text-3xl font-bold text-gray-400';
                    if (qcIndicator) qcIndicator.className = 'w-12 h-12 bg-gray-500/20 rounded-xl flex items-center justify-center';
                }
            }

            updateChartsBrft(filtered);
            updateFindingsTableBrft(filtered);
            updateAllTrendTablesBrft();
        }

        function resetFilterBrft() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const firstDay = `${year}-${month}-01`;
            const lastDay = new Date(year, now.getMonth() + 1, 0).getDate();
            const lastDayFormatted = `${year}-${month}-${String(lastDay).padStart(2, '0')}`;

            const filterDateFrom = document.getElementById('filter-date-from');
            const filterDateTo = document.getElementById('filter-date-to');
            if (filterDateFrom) filterDateFrom.value = firstDay;
            if (filterDateTo) filterDateTo.value = lastDayFormatted;

            selectedFilters.products.clear();
            selectedFilters.categories.clear();
            selectedFilters.analysts.clear();

            ['product', 'category', 'analyst'].forEach(type => {
                const allCheck = document.getElementById(`filter-${type}-all`);
                if (allCheck) allCheck.checked = true;
                document.querySelectorAll(`.filter-${type}-checkbox`).forEach(cb => cb.checked = false);
                updateMultiSelectLabel(type);
            });

            updateDashboardBrft();
        }

        // ============================================================
        // CHARTS BRFT
        // ============================================================
        function updateChartsBrft(filteredFindings) {
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        anchor: 'center',
                        align: 'center',
                        color: '#ffffff',
                        font: { size: 14, weight: 'bold' },
                        formatter: (value) => value > 0 ? value : ''
                    }
                },
                scales: {
                    x: { grid: { color: '#374151' }, ticks: { color: '#9ca3af', font: { size: 10 } } },
                    y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af', font: { size: 10 } } }
                }
            };

            const currentYear = new Date().getFullYear();
            const monthlyData = {};
            store.findings.forEach(f => {
                if (f.date) {
                    const month = f.date.substring(0, 7);
                    const year = parseInt(f.date.substring(0, 4));
                    if (year === currentYear) {
                        monthlyData[month] = (monthlyData[month] || 0) + 1;
                    }
                }
            });

            const months = Object.keys(monthlyData).sort();
            const monthLabels = months.map(m => {
                const [year, month] = m.split('-');
                const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                return `${monthNames[parseInt(month) - 1]} ${year}`;
            });

            const qcTrend = months.map(m => {
                const target = store.targets.find(t => t.target_month === m);
                if (target) {
                    const findingsInMonth = store.findings.filter(f => f.date && f.date.startsWith(m));
                    const uniqueBatchSet = new Set(findingsInMonth.map(f => f.batch_number).filter(b => b));
                    return target.target_value > 0 ? ((target.target_value - uniqueBatchSet.size) / target.target_value) * 100 : 0;
                }
                return 0;
            });

            const chartTrend = document.getElementById('chart-trend');
            if (chartTrend) {
                if (charts.trend) charts.trend.destroy();
                charts.trend = new Chart(chartTrend, {
                    type: 'line',
                    data: {
                        labels: monthLabels,
                        datasets: [{ data: qcTrend, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', fill: true, tension: 0.4 }]
                    },
                    options: {
                        ...chartOptions,
                        scales: { ...chartOptions.scales, y: { ...chartOptions.scales.y, min: 0, max: 100 } },
                        plugins: {
                            ...chartOptions.plugins,
                            datalabels: {
                                ...chartOptions.plugins.datalabels,
                                formatter: (value) => value > 0 ? value.toFixed(1) + '%' : ''
                            }
                        }
                    },
                    plugins: [ChartDataLabels]
                });
            }

            const chartMonthly = document.getElementById('chart-monthly');
            if (chartMonthly) {
                if (charts.monthly) charts.monthly.destroy();
                charts.monthly = new Chart(chartMonthly, {
                    type: 'bar',

        function generateTrendTable(data, type, limit = 8) {
            if (!data || data.length === 0) {
                return { header: '<th class="p-4 text-center text-gray-400" colspan="2">BELUM ADA DATA</th>', body: '' };
            }

            let nameField, nameLabel, badgeClass;
            switch (type) {
                case 'product': nameField = 'product_name'; nameLabel = 'PRODUK'; badgeClass = 'product-badge'; break;
                case 'analyst': nameField = 'analyst_name'; nameLabel = 'ANALYST'; badgeClass = 'analyst-badge'; limit = 10; break;
                case 'category': nameField = 'category_name'; nameLabel = 'KATEGORI'; badgeClass = 'category-badge'; break;
                default: return { header: '', body: '' };
            }

            const itemMonthlyData = {};
            const monthsSet = new Set();

            data.forEach(f => {
                if (f.date && f[nameField]) {
                    const month = f.date.substring(0, 7);
                    monthsSet.add(month);
                    if (!itemMonthlyData[f[nameField]]) {
                        itemMonthlyData[f[nameField]] = {};
                    }
                    itemMonthlyData[f[nameField]][month] = (itemMonthlyData[f[nameField]][month] || 0) + 1;
                }
            });

            const sortedMonths = Array.from(monthsSet).sort();
            const itemTotals = Object.keys(itemMonthlyData).map(item => ({
                name: item,
                total: Object.values(itemMonthlyData[item]).reduce((sum, val) => sum + val, 0)
            }));
            itemTotals.sort((a, b) => b.total - a.total);
            const topItems = itemTotals.slice(0, limit).map(item => item.name);

            if (topItems.length === 0) {
                return { header: '<th class="p-4 text-center text-gray-400" colspan="2">BELUM ADA DATA</th>', body: '' };
            }

            const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            let headerHTML = `<th class="sticky left-0 bg-gray-700 text-left" style="min-width:120px;">${nameLabel}</th>`;
            sortedMonths.forEach(month => {
                const [year, monthNum] = month.split('-');
                headerHTML += `<th style="min-width:70px;">${monthNames[parseInt(monthNum) - 1]}<br><span class="text-xs text-gray-400">${year}</span></th>`;
            });
            headerHTML += '<th style="min-width:80px; background-color:#4b5563;">TOTAL</th>';

            let bodyHTML = '';
            topItems.forEach(item => {
                let rowHTML = `<tr><td class="sticky left-0 bg-gray-800 font-bold text-left"><span class="item-badge ${badgeClass}">${item}</span></td>`;
                let itemTotal = 0;
                sortedMonths.forEach(month => {
                    const count = itemMonthlyData[item]?.[month] || 0;
                    itemTotal += count;
                    let bgColor = 'bg-gray-800';
                    if (count > 0) {
                        if (count >= 5) bgColor = 'bg-red-900/60';
                        else if (count >= 3) bgColor = 'bg-orange-900/50';
                        else if (count >= 1) bgColor = 'bg-yellow-900/40';
                    }
                    rowHTML += `<td class="${bgColor} font-mono">${count || '-'}</td>`;
                });
                rowHTML += `<td class="bg-blue-900/40 font-bold">${itemTotal}</td></tr>`;
                bodyHTML += rowHTML;
            });

            let totalRowHTML = '<tr class="border-t-2 border-gray-600 bg-gray-700/50"><td class="sticky left-0 bg-gray-700 font-bold">TOTAL</td>';
            sortedMonths.forEach(month => {
                let monthTotal = 0;
                topItems.forEach(item => {
                    monthTotal += itemMonthlyData[item]?.[month] || 0;
                });
                totalRowHTML += `<td class="font-bold">${monthTotal || '-'}</td>`;
            });
            let grandTotal = 0;
            topItems.forEach(item => {
                grandTotal += itemTotals.find(i => i.name === item)?.total || 0;
            });
            totalRowHTML += `<td class="bg-blue-800/60 font-bold">${grandTotal}</td></tr>`;
            bodyHTML += totalRowHTML;

            return { header: headerHTML, body: bodyHTML };
        }

                    const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];

        function setupMultiSelectDropdowns() {
            ['product', 'category', 'analyst'].forEach(type => {

                    ['product', 'category', 'analyst'].forEach(t => {
                        const d = document.getElementById(`filter-${t}-dropdown`);
                        if (d && t !== type) d.classList.add('hidden');
                    });
                    dropdown.classList.toggle('hidden');
                });

                if (selectAll) {
                    selectAll.addEventListener('change', (e) => {
                        let filterKey = type === 'product' ? 'products' : type === 'category' ? 'categories' : 'analysts';
                        const checkboxes = document.querySelectorAll(`.filter-${type}-checkbox`);
                        checkboxes.forEach(cb => {
                            cb.checked = e.target.checked;
                            if (e.target.checked) selectedFilters[filterKey].add(cb.value);
                            else selectedFilters[filterKey].delete(cb.value);
                        });
                        updateMultiSelectLabel(type);
                    });
                }

                // Populate list
                const listEl = document.getElementById(`filter-${type}-list`);
                if (listEl) {
                    const items = type === 'product' ? store.products : type === 'category' ? store.categories : store.analysts;
                    let filterKey = type === 'product' ? 'products' : type === 'category' ? 'categories' : 'analysts';
                    listEl.innerHTML = items.map(item => `
                        <label class="flex items-center gap-2 px-2 py-1 hover:bg-gray-600 rounded cursor-pointer">
                            <input type="checkbox" class="filter-${type}-checkbox form-checkbox text-emerald-600 rounded" 
                                   value="${item.name}" ${selectedFilters[filterKey].has(item.name) ? 'checked' : ''}>
                            <span class="text-sm">${item.name}</span>
                        </label>
                    `).join('');
                    listEl.querySelectorAll(`.filter-${type}-checkbox`).forEach(cb => {
                        cb.addEventListener('change', function() {
                            let filterKey2 = type === 'product' ? 'products' : type === 'category' ? 'categories' : 'analysts';
                            if (this.checked) selectedFilters[filterKey2].add(this.value);
                            else selectedFilters[filterKey2].delete(this.value);
                            updateMultiSelectLabel(type);
                            const allCheck = document.getElementById(`filter-${type}-all`);
                            if (allCheck) allCheck.checked = selectedFilters[filterKey2].size === items.length;
                        });
                    });
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.multi-select-wrapper')) {
                    ['product', 'category', 'analyst'].forEach(type => {
                        const d = document.getElementById(`filter-${type}-dropdown`);
                        if (d) d.classList.add('hidden');
                    });
                }
            });
        }

        function updateMultiSelectLabel(type) {
            let filterKey = type === 'product' ? 'products' : type === 'category' ? 'categories' : 'analysts';
            const labelEl = document.getElementById(`filter-${type}-label`);
            if (!labelEl) return;

            const count = selectedFilters[filterKey].size;
            const labels = {
                product: ['SEMUA PRODUK', 'PRODUK DIPILIH'],
                category: ['SEMUA KATEGORI', 'KATEGORI DIPILIH'],
                analyst: ['SEMUA ANALYST', 'ANALYST DIPILIH']
            };

            if (count === 0) labelEl.textContent = labels[type][0];
            else if (count === 1) labelEl.textContent = Array.from(selectedFilters[filterKey])[0];
            else labelEl.textContent = `${count} ${labels[type][1]}`;
        }

                        </div>
                    </div>
                `;
            }).join('');

            // Attach event listeners
            document.querySelectorAll('.temuan-area-select').forEach(sel => {
                sel.addEventListener('change', function() {
                    const index = parseInt(this.dataset.index);
                    temuan5rItems[index].areaId = this.value;
                    temuan5rItems[index].subarea = '';
                    renderTemuan5rItems();
                });
            });

            document.querySelectorAll('.temuan-subarea-select').forEach(sel => {
                sel.addEventListener('change', function() {
                    const index = parseInt(this.dataset.index);
                    temuan5rItems[index].subarea = this.value;
                });
            });

            document.querySelectorAll('.temuan-desc').forEach(txt => {
                txt.addEventListener('input', function() {
                    const index = parseInt(this.dataset.index);
                    temuan5rItems[index].desc = this.value;
                });

            document.querySelectorAll('.temuan-photo').forEach(input => {
                input.addEventListener('change', function() {
                    const index = parseInt(this.dataset.index);
                    const file = this.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            temuan5rItems[index].photoData = e.target.result;
                            renderTemuan5rItems();
                        };
                        reader.readAsDataURL(file);
                    }
                });
            });
        }

        // ============================================================

        function updateDashboard5r() {
            let filtered = [...store.findings5r];
            const dateFrom = document.getElementById('filter-5r-date-from')?.value;
            const dateTo = document.getElementById('filter-5r-date-to')?.value;
            const areaFilter = document.getElementById('filter-5r-area')?.value;
            const auditorFilter = document.getElementById('filter-5r-auditor')?.value;

            if (dateFrom) filtered = filtered.filter(f => f.date >= dateFrom);
            if (dateTo) filtered = filtered.filter(f => f.date <= dateTo);
            if (areaFilter) filtered = filtered.filter(f => f.area_name === areaFilter);
            if (auditorFilter) filtered = filtered.filter(f => f.auditor_name === auditorFilter);

            const totalArea = document.getElementById('total-area-5r');
            const totalAuditor = document.getElementById('total-auditor-5r');

            if (totalAuditor) totalAuditor.textContent = new Set(filtered.map(f => f.auditor_name).filter(Boolean)).size;
            if (totalAuditee) totalAuditee.textContent = new Set(filtered.map(f => f.auditee_name).filter(Boolean)).size;

        function resetFilter5r() {

        // ============================================================
        // CHARTS 5R
        // ============================================================
        function updateCharts5r(filteredData) {
            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        anchor: 'center',
                        align: 'center',
                        color: '#ffffff',
                        font: { size: 14, weight: 'bold' },
                        formatter: (value) => value > 0 ? value : ''
                    }
                },
                scales: {
                    x: { grid: { color: '#374151' }, ticks: { color: '#9ca3af', font: { size: 10 } } },
                    y: { grid: { color: '#374151' }, ticks: { color: '#9ca3af', font: { size: 10 } } }
                }
            };

            // Monthly trend
            const currentYear = new Date().getFullYear();
            const monthlyData = {};
            filteredData.forEach(f => {
                if (f.date) {
                    const month = f.date.substring(0, 7);
                    const year = parseInt(f.date.substring(0, 4));
                    if (year === currentYear) {
                        monthlyData[month] = (monthlyData[month] || 0) + 1;
                    }
                }
            });

            const months = Object.keys(monthlyData).sort();
            const monthLabels = months.map(m => {
                const [year, month] = m.split('-');
                const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                return `${monthNames[parseInt(month) - 1]} ${year}`;
            });

            const chartMonthly = document.getElementById('chart-5r-monthly');
            if (chartMonthly) {
                if (charts['5r-monthly']) charts['5r-monthly'].destroy();
                charts['5r-monthly'] = new Chart(chartMonthly, {
                    type: 'bar',
                    data: { labels: monthLabels, datasets: [{ data: months.map(m => monthlyData[m]), backgroundColor: '#8b5cf6' }] },
                    options: chartOptions,
                    plugins: [ChartDataLabels]
                });
            }

            // Area chart
            const areaData = {};
            filteredData.forEach(f => { if (f.area_name) areaData[f.area_name] = (areaData[f.area_name] || 0) + 1; });
            const areaSorted = Object.entries(areaData).sort((a, b) => b[1] - a[1]);
            const chartArea = document.getElementById('chart-5r-area');
            if (chartArea) {
                if (charts['5r-area']) charts['5r-area'].destroy();
                charts['5r-area'] = new Chart(chartArea, {
                    type: 'bar',
                    data: { labels: areaSorted.map(a => a[0]), datasets: [{ data: areaSorted.map(a => a[1]), backgroundColor: '#14b8a6' }] },
                    options: chartOptions,
                    plugins: [ChartDataLabels]
                });
            }

            // Auditor chart
            const auditorData = {};
            filteredData.forEach(f => { if (f.auditor_name) auditorData[f.auditor_name] = (auditorData[f.auditor_name] || 0) + 1; });
            const auditorSorted = Object.entries(auditorData).sort((a, b) => b[1] - a[1]);
            const chartAuditor = document.getElementById('chart-5r-auditor');
            if (chartAuditor) {
                if (charts['5r-auditor']) charts['5r-auditor'].destroy();
                charts['5r-auditor'] = new Chart(chartAuditor, {
                    type: 'bar',
                    data: { labels: auditorSorted.map(a => a[0]), datasets: [{ data: auditorSorted.map(a => a[1]), backgroundColor: '#ec4899' }] },
                    options: chartOptions,
                    plugins: [ChartDataLabels]
                });
            }
        }

        function generateTrendTable5r(data, nameField, nameLabel, limit = 8) {
            if (!data || data.length === 0) {
                return { header: '<th class="p-4 text-center text-gray-400" colspan="2">BELUM ADA DATA</th>', body: '' };
            }

            const itemMonthlyData = {};
            const monthsSet = new Set();

            data.forEach(f => {
                if (f.date && f[nameField]) {
                    const month = f.date.substring(0, 7);
                    monthsSet.add(month);
                    if (!itemMonthlyData[f[nameField]]) {
                        itemMonthlyData[f[nameField]] = {};
                    }
                    itemMonthlyData[f[nameField]][month] = (itemMonthlyData[f[nameField]][month] || 0) + 1;
                }
            });

            const sortedMonths = Array.from(monthsSet).sort();
            const itemTotals = Object.keys(itemMonthlyData).map(item => ({
                name: item,
                total: Object.values(itemMonthlyData[item]).reduce((sum, val) => sum + val, 0)
            }));
            itemTotals.sort((a, b) => b.total - a.total);
            const topItems = itemTotals.slice(0, limit).map(item => item.name);

            if (topItems.length === 0) {
                return { header: '<th class="p-4 text-center text-gray-400" colspan="2">BELUM ADA DATA</th>', body: '' };
            }

            const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            let headerHTML = `<th class="sticky left-0 bg-gray-700 text-left" style="min-width:120px;">${nameLabel}</th>`;
            sortedMonths.forEach(month => {
                const [year, monthNum] = month.split('-');
                headerHTML += `<th style="min-width:70px;">${monthNames[parseInt(monthNum) - 1]}<br><span class="text-xs text-gray-400">${year}</span></th>`;
            });
            headerHTML += '<th style="min-width:80px; background-color:#4b5563;">TOTAL</th>';

            let bodyHTML = '';
            topItems.forEach(item => {
                let rowHTML = `<tr><td class="sticky left-0 bg-gray-800 font-bold text-left"><span class="item-badge">${item}</span></td>`;
                let itemTotal = 0;
                sortedMonths.forEach(month => {
                    const count = itemMonthlyData[item]?.[month] || 0;
                    itemTotal += count;
                    let bgColor = 'bg-gray-800';
                    if (count > 0) {
                        if (count >= 5) bgColor = 'bg-red-900/60';
                        else if (count >= 3) bgColor = 'bg-orange-900/50';
                        else if (count >= 1) bgColor = 'bg-yellow-900/40';
                    }
                    rowHTML += `<td class="${bgColor} font-mono">${count || '-'}</td>`;
                });
                rowHTML += `<td class="bg-blue-900/40 font-bold">${itemTotal}</td></tr>`;
                bodyHTML += rowHTML;
            });

            let totalRowHTML = '<tr class="border-t-2 border-gray-600 bg-gray-700/50"><td class="sticky left-0 bg-gray-700 font-bold">TOTAL</td>';
            sortedMonths.forEach(month => {
                let monthTotal = 0;
                topItems.forEach(item => {
                    monthTotal += itemMonthlyData[item]?.[month] || 0;
                });
                totalRowHTML += `<td class="font-bold">${monthTotal || '-'}</td>`;
            });
            let grandTotal = 0;
            topItems.forEach(item => {
                grandTotal += itemTotals.find(i => i.name === item)?.total || 0;
            });
            totalRowHTML += `<td class="bg-blue-800/60 font-bold">${grandTotal}</td></tr>`;
            bodyHTML += totalRowHTML;

            return { header: headerHTML, body: bodyHTML };
        }

        // ============================================================
        // EXPORT FUNCTIONS 5R
        // ============================================================
        function exportPdf5r() {
            const data = store.findings5r;
            if (data.length === 0) {
                showToast('TIDAK ADA DATA UNTUK DIEXPORT', 'error');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(16);
            doc.text('LAPORAN DETAIL TEMUAN 5R', 105, 15, { align: 'center' });
            doc.setFontSize(10);
            doc.text(`Total Temuan: ${data.length}`, 105, 25, { align: 'center' });
            doc.text(`Generated: ${new Date().toLocaleString('ID-id')}`, 105, 32, { align: 'center' });

            let y = 45;
            doc.setFontSize(8);
            doc.setFillColor(40, 40, 40);
            doc.setTextColor(255, 255, 255);
            doc.rect(15, y - 5, 180, 7, 'F');

            doc.text('NO', 17, y);
            doc.text('TANGGAL', 27, y);
            doc.text('AUDITOR', 45, y);
            doc.text('AUDITEE', 62, y);
            doc.text('AREA', 78, y);
            doc.text('SUB AREA', 98, y);
            doc.text('TEMUAN', 118, y);

            y += 5;
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(7);

            data.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach((f, index) => {
                if (y > 280) {
                    doc.addPage();
                    y = 20;
                    doc.setFontSize(8);
                    doc.setFillColor(40, 40, 40);
                    doc.setTextColor(255, 255, 255);
                    doc.rect(15, y - 5, 180, 7, 'F');
                    doc.text('NO', 17, y);
                    doc.text('TANGGAL', 27, y);
                    doc.text('AUDITOR', 45, y);
                    doc.text('AUDITEE', 62, y);
                    doc.text('AREA', 78, y);
                    doc.text('SUB AREA', 98, y);
                    doc.text('TEMUAN', 118, y);
                    y += 5;
                    doc.setTextColor(0, 0, 0);
                }

                let formattedDate = '-';
                if (f.date) {
                    const [year, month, day] = f.date.split('-');
                    const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                    formattedDate = `${day} ${monthNames[parseInt(month) - 1]}`;
                }

                doc.text(`${index + 1}`, 17, y);
                doc.text(formattedDate, 27, y);
                doc.text(f.auditor_name || '-', 45, y);
                doc.text(f.auditee_name || '-', 62, y);
                doc.text(f.area_name || '-', 78, y);
                doc.text(f.subarea || '-', 98, y);

                const desc = f.temuan || '-';
                const lines = doc.splitTextToSize(desc, 55);
                lines.forEach((line, idx) => {
                    if (y > 280) {
                        doc.addPage();
                        y = 20;
                    }
                    doc.text(line, 118, y);
                    if (idx < lines.length - 1) y += 3;
                });
                y += 5;
            });

            doc.save(`5R_TEMUAN_${new Date().toISOString().split('T')[0]}.pdf`);
            showToast('PDF TEMUAN 5R BERHASIL DIEXPORT', 'success');
        }

        function exportExcel5r() {
            const data = store.findings5r;
            if (data.length === 0) {
                showToast('TIDAK ADA DATA UNTUK DIEXPORT', 'error');
                return;
            }

            const excelData = data.sort((a, b) => new Date(a.date) - new Date(b.date)).map((f, index) => {
                let formattedDate = '-';
                if (f.date) {
                    const [year, month, day] = f.date.split('-');
                    const monthNames = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
                    formattedDate = `${day} ${monthNames[parseInt(month) - 1]} ${year}`;
                }
                return {
                    NO: index + 1,
                    TANGGAL: formattedDate,
                    AUDITOR: f.auditor_name || '-',
                    AUDITEE: f.auditee_name || '-',
                    AREA: f.area_name || '-',
                    'SUB AREA': f.subarea || '-',
                    'TEMUAN 5R': f.temuan || '-'
                };
            });

            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Temuan 5R");
            XLSX.writeFile(wb, `5R_TEMUAN_${new Date().toISOString().split('T')[0]}.xlsx`);
            showToast('EXCEL TEMUAN 5R BERHASIL DIEXPORT', 'success');
        }

                // Targets

                    targetsList.innerHTML = store.targets.length === 0 ?

                            const uniqueBatches = new Set(store.findings.filter(f => f.date && f.date.startsWith(t.target_month)).map(f => f.batch_number)).size;

        function createMasterItem(item, type) {
            return `
                <div class="flex items-center justify-between bg-gray-700 rounded-lg px-4 py-3" data-id="${item.id}">
                    <span class="font-medium">${item.name}</span>
                    <div class="flex gap-2">
                        <button class="edit-${type} text-blue-400 hover:text-blue-300 p-1" data-id="${item.id}">✏️</button>
                        <button class="delete-${type} text-red-400 hover:text-red-300 p-1" data-id="${item.id}">🗑️</button>
                    </div>
                </div>
            `;
        }

        function createProductItem(product) {
            const paramsHtml = product.parameters && product.parameters.length > 0 ?
                product.parameters.map(p => `<span class="parameter-tag">${p}</span>`).join('') :
                '<span class="text-gray-500 text-xs">BELUM ADA PARAMETER</span>';

            return `
                <div class="flex flex-col gap-2 bg-gray-700 rounded-lg px-4 py-3" data-id="${product.id}">
                    <div class="flex items-center justify-between">
                        <span class="font-medium text-emerald-400">${product.name}</span>
                        <div class="flex gap-2">
                            <button class="edit-product text-blue-400 hover:text-blue-300 p-1" data-id="${product.id}">✏️</button>
                            <button class="delete-product text-red-400 hover:text-red-300 p-1" data-id="${product.id}">🗑️</button>
                        </div>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <span class="text-xs text-gray-400">PARAMETER:</span>
                        ${paramsHtml}
                        <button class="add-param-btn text-xs bg-blue-600 hover:bg-blue-700 px-2 py-1 rounded transition" data-id="${product.id}">+ TAMBAH</button>
                    </div>
                </div>
            `;
        }

        function setupManagementEventListeners() {
            // Add area
            document.querySelectorAll('.add-area-btn').forEach(btn => {
                btn.removeEventListener('click', handleAddArea);
                btn.addEventListener('click', handleAddArea);
            });

            // Add subarea
            document.querySelectorAll('.add-subarea-btn').forEach(btn => {
                btn.removeEventListener('click', handleAddSubarea);
                btn.addEventListener('click', handleAddSubarea);
            });

            // Edit/Delete handlers
            document.querySelectorAll('.edit-analyst, .edit-product, .edit-category, .edit-area, .edit-target').forEach(btn => {
                btn.removeEventListener('click', handleEdit);
                btn.addEventListener('click', handleEdit);
            });

            document.querySelectorAll('.delete-analyst, .delete-product, .delete-category, .delete-area, .delete-target, .delete-finding, .delete-5r').forEach(btn => {
                btn.removeEventListener('click', handleDelete);
                btn.addEventListener('click', handleDelete);
            });

            document.querySelectorAll('.add-param-btn').forEach(btn => {
                btn.removeEventListener('click', handleAddParam);
                btn.addEventListener('click', handleAddParam);
            });
        }

        function handleAddArea(e) {
            const analystId = e.currentTarget.dataset.id;
            document.getElementById('edit-value').placeholder = 'NAMA AREA';
            document.getElementById('edit-value').value = '';
            document.getElementById('edit-modal').classList.remove('hidden');

            editCallback = () => {
                const areaName = document.getElementById('edit-value').value.trim().toUpperCase();
                if (!areaName) { showToast('NAMA AREA TIDAK BOLEH KOSONG', 'error'); return; }
                if (store.areas.some(a => a.name === areaName && a.analyst_id === analystId)) {
                    showToast('AREA SUDAH ADA UNTUK ANALYST INI', 'error');
                    return;
                }
                store.areas.push({ id: DB.id(), name: areaName, analyst_id: analystId, subareas: [] });
                saveStore();
                addAuditLog('CREATE', `NEW AREA "${areaName}"`);
                showToast('AREA BERHASIL DITAMBAHKAN', 'success');
                document.getElementById('edit-modal').classList.add('hidden');
                updateManagementData();
            };
            document.getElementById('confirm-edit').onclick = editCallback;
        }

        function handleAddSubarea(e) {
            const areaId = e.currentTarget.dataset.id;
            document.getElementById('edit-value').placeholder = 'NAMA SUB AREA';
            document.getElementById('edit-value').value = '';
            document.getElementById('edit-modal').classList.remove('hidden');

            editCallback = () => {
                const subName = document.getElementById('edit-value').value.trim().toUpperCase();
                if (!subName) { showToast('SUB AREA TIDAK BOLEH KOSONG', 'error'); return; }
                const area = store.areas.find(a => a.id === areaId);
                if (!area) { showToast('AREA TIDAK DITEMUKAN', 'error'); return; }
                if (!area.subareas) area.subareas = [];
                if (area.subareas.includes(subName)) { showToast('SUB AREA SUDAH ADA', 'error'); return; }
                area.subareas.push(subName);
                saveStore();
                addAuditLog('UPDATE', `ADDED SUBAREA "${subName}" TO AREA "${area.name}"`);
                showToast('SUB AREA BERHASIL DITAMBAHKAN', 'success');
                document.getElementById('edit-modal').classList.add('hidden');
                updateManagementData();
            };
            document.getElementById('confirm-edit').onclick = editCallback;
        }

        function handleEdit(e) {
            const btn = e.currentTarget;
            const type = btn.className.includes('edit-analyst') ? 'analyst' :
                         btn.className.includes('edit-product') ? 'product' :
                         btn.className.includes('edit-category') ? 'category' :
                         btn.className.includes('edit-area') ? 'area' :
                         btn.className.includes('edit-target') ? 'target' : null;
            const id = btn.dataset.id;

            if (type === 'target') {
                const target = store.targets.find(t => t.id === id);
                if (!target) return;
                document.getElementById('edit-value').placeholder = 'NILAI TARGET';
                document.getElementById('edit-value').value = target.target_value || '';
                document.getElementById('edit-modal').classList.remove('hidden');
                editCallback = () => {
                    const newValue = parseInt(document.getElementById('edit-value').value);
                    if (isNaN(newValue) || newValue <= 0) { showToast('NILAI TARGET TIDAK VALID', 'error'); return; }
                    target.target_value = newValue;
                    saveStore();
                    addAuditLog('UPDATE', `UPDATED TARGET ${target.target_month}: ${newValue}`);
                    showToast('TARGET BERHASIL DIUPDATE', 'success');
                    document.getElementById('edit-modal').classList.add('hidden');
                    updateManagementData();
                };
                document.getElementById('confirm-edit').onclick = editCallback;
                return;
            }

            let item = null;
            let label = '';
            if (type === 'analyst') { item = store.analysts.find(a => a.id === id); label = 'INISIAL ANALYST'; }
            else if (type === 'product') { item = store.products.find(p => p.id === id); label = 'KODE PRODUK'; }
            else if (type === 'category') { item = store.categories.find(c => c.id === id); label = 'NAMA KATEGORI'; }
            else if (type === 'area') { item = store.areas.find(a => a.id === id); label = 'NAMA AREA'; }
            if (!item) return;

            document.getElementById('edit-value').placeholder = label;
            document.getElementById('edit-value').value = item.name || '';
            document.getElementById('edit-modal').classList.remove('hidden');

            editCallback = () => {
                const newValue = document.getElementById('edit-value').value.trim().toUpperCase();
                if (!newValue) { showToast('NILAI TIDAK BOLEH KOSONG', 'error'); return; }
                const oldName = item.name;
                item.name = newValue;
                saveStore();
                addAuditLog('UPDATE', `UPDATED ${type.toUpperCase()}: ${oldName} → ${newValue}`);
                showToast('DATA BERHASIL DIUPDATE', 'success');
                document.getElementById('edit-modal').classList.add('hidden');
                updateManagementData();
            };
            document.getElementById('confirm-edit').onclick = editCallback;
        }

        function handleDelete(e) {
            const btn = e.currentTarget;
            const id = btn.dataset.id;
            const type = btn.className.includes('delete-analyst') ? 'analyst' :
                         btn.className.includes('delete-product') ? 'product' :
                         btn.className.includes('delete-category') ? 'category' :
                         btn.className.includes('delete-area') ? 'area' :
                         btn.className.includes('delete-target') ? 'target' :
                         btn.className.includes('delete-finding') ? 'finding' :
                         btn.className.includes('delete-5r') ? 'finding5r' : null;

            document.getElementById('delete-modal').classList.remove('hidden');
            deleteCallback = () => {
                let item = null;
                let name = '';
                if (type === 'analyst') {
                    item = store.analysts.find(a => a.id === id);
                    if (item) { name = item.name; store.analysts = store.analysts.filter(a => a.id !== id); }
                } else if (type === 'product') {
                    item = store.products.find(p => p.id === id);
                    if (item) { name = item.name; store.products = store.products.filter(p => p.id !== id); }
                } else if (type === 'category') {
                    item = store.categories.find(c => c.id === id);
                    if (item) { name = item.name; store.categories = store.categories.filter(c => c.id !== id); }
                } else if (type === 'area') {
                    item = store.areas.find(a => a.id === id);
                    if (item) { name = item.name; store.areas = store.areas.filter(a => a.id !== id); }
                } else if (type === 'target') {
                    item = store.targets.find(t => t.id === id);
                    if (item) { name = item.target_month; store.targets = store.targets.filter(t => t.id !== id); }
                } else if (type === 'finding') {
                    item = store.findings.find(f => f.id === id);
                    if (item) { name = item.batch_number || id; store.findings = store.findings.filter(f => f.id !== id); }
                } else if (type === 'finding5r') {
                    item = store.findings5r.find(f => f.id === id);
                    if (item) { name = item.temuan || id; store.findings5r = store.findings5r.filter(f => f.id !== id); }
                }
                if (item) {
                    saveStore();
                    addAuditLog('DELETE', `DELETED ${type.toUpperCase()}: ${name}`);
                    showToast('DATA BERHASIL DIHAPUS', 'success');
                    document.getElementById('delete-modal').classList.add('hidden');
                    updateManagementData();
                }
            };
            document.getElementById('confirm-delete').onclick = deleteCallback;
        }

        function handleAddParam(e) {
            const productId = e.currentTarget.dataset.id;
            document.getElementById('edit-value').placeholder = 'MASUKKAN NAMA PARAMETER';
            document.getElementById('edit-value').value = '';
            document.getElementById('edit-modal').classList.remove('hidden');

            editCallback = () => {
                const paramName = document.getElementById('edit-value').value.trim().toUpperCase();
                if (!paramName) { showToast('PARAMETER TIDAK BOLEH KOSONG', 'error'); return; }
                const product = store.products.find(p => p.id === productId);
                if (!product) { showToast('PRODUK TIDAK DITEMUKAN', 'error'); return; }
                if (!product.parameters) product.parameters = [];
                if (product.parameters.includes(paramName)) { showToast('PARAMETER SUDAH ADA', 'error'); return; }
                product.parameters.push(paramName);
                saveStore();
                addAuditLog('UPDATE', `ADDED PARAMETER "${paramName}" TO PRODUCT "${product.name}"`, product.name);
                showToast('PARAMETER BERHASIL DITAMBAHKAN', 'success');
                document.getElementById('edit-modal').classList.add('hidden');
                updateManagementData();
            };
            document.getElementById('confirm-edit').onclick = editCallback;
        }

        // ============================================================
        // CANCEL BUTTONS FOR MODALS
        // ============================================================
        document.getElementById('cancel-delete').addEventListener('click', () => {
            document.getElementById('delete-modal').classList.add('hidden');
        });

        document.getElementById('cancel-edit').addEventListener('click', () => {
            document.getElementById('edit-modal').classList.add('hidden');
        });

        // ============================================================
        // THEME TOGGLE
        // ============================================================
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('bg-gray-100');
            document.body.classList.toggle('bg-gray-900');
            document.body.classList.toggle('text-gray-900');
            document.body.classList.toggle('text-gray-100');
        });

        // ============================================================
        // DATE/TIME UPDATE
        // ============================================================
        function updateDateTime() {
            const currentDate = document.getElementById('current-date');
            const currentTime = document.getElementById('current-time');
            if (currentDate) {
                currentDate.textContent = new Date().toLocaleDateString('ID-id', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                }).toUpperCase();
            }
            if (currentTime) {
                currentTime.textContent = new Date().toLocaleTimeString('ID-id', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }
        }

        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ============================================================
        // INITIALIZATION
        // ============================================================
        function init() {
            loadStore();
            console.log('✅ BRFT + 5R System initialized');
            console.log('📦 Storage mode:', USE_LOCAL_STORAGE ? 'localStorage' : 'Memory (fallback)');
            console.log('📊 Data:', store);
        }

        init();
    </script>
</body>
</html>
